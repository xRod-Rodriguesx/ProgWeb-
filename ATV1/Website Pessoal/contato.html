<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodolfo Corbalan - Contato</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">
            <span class="logo-r">R</span>
            <div class="logo-text">
                <strong>Rodolfo Corbalan</strong>
                <span>Developer</span>
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">APRESENTAÇÃO</a></li>
                <li><a href="servicos.html">FORMAÇÃO</a></li>
                <li><a href="portfolio.html">PROJETOS</a></li>

                <li><a href="contato.html" class="btn-contato active">CONTATO</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contato-container">
            <h1>Entre em Contato</h1>
            <p class="intro-contato">Preencha o formulário abaixo. (Formulário fictício para fins acadêmicos).</p>

            <form action="#" method="POST" class="form-contato">
                
                <div class="form-group">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" required placeholder="Digite seu nome completo">
                </div>

                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required placeholder="seu.email@exemplo.com">
                </div>

                <div class="form-group">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="6" required placeholder="Escreva sua mensagem aqui..."></textarea>
                </div>

                <button type="submit" class="btn-enviar">ENVIAR MENSAGEM</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="social-links">
            <a href="#">[ LinkedIn ]</a>
            <a href="#">[ GitHub ]</a>
            <a href="#">[ E-mail ]</a>
        </div>
        <p>&copy; 2026 Rodolfo Corbalan. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
